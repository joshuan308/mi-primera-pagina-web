<main>
    <h2>Contacto</h2>

    <div class="contenedor">
        <div class="columna">
            <form action="" method="post" enctype="multipart/form-data" class="formulario">

                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required
                    placeholder="Escribe tu nombre"
                    oninvalid="this.setCustomValidity('Rellena el campo')"
                    oninput="this.setCustomValidity('')">

                <label for="tipo">Tipo de solicitud:</label>
                <select name="tipo" id="tipo" required>
                    <option value="">-- Selecciona una opción --</option>
                    <option value="Soporte">Soporte</option>
                    <option value="Ventas">Ventas</option>
                    <option value="Cotización">Cotizaciones</option>
                </select>

                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required
                    placeholder="tucorreo@email.com">

                <label for="archivo">Subir un archivo:</label>
                <input type="file" id="archivo" name="archivo">

                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" name="descripcion" required
                    placeholder="Escribe tu mensaje aquí..."></textarea>

                <input type="submit" value="Enviar solicitud">

            </form>
        </div>

        <div class="columna">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3917.4814177285925!2d-74.8031113263686!3d10.926960589231117!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8ef5d35e6ab152fd%3A0x432dea950e1d49b9!2sEstadio%20Metropolitano%20Roberto%20Mel%C3%A9ndez!5e0!3m2!1ses!2sco!4v1777672854555!5m2!1ses!2sco"
                width="600" height="450" style="border:0; border-radius:10px; border: 2px solid rgb(220,30,30);"
                allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
            <p style="color:#ffdd00; font-weight:bold; margin-top:10px;"> Estadio Metropolitano Roberto Meléndez - Barranquilla</p>
        </div>
    </div>
</main>
